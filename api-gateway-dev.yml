server:
  port: 8080
spring:
  application:
    name: api-gateway
  profiles:
    active: default
      - dev
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:8080/auth-service
  data:
    redis:
      host: localhost
      port: 6371
  cloud:
    gateway:
      default-filters:
        - name: RequestRateLimiter
          args:
            redis-rate-limiter.replenishRate: 5
            redis-rate-limiter.burstCapacity: 10
      routes:
      - id: accouct service
        url:  Ib://ACCOUNT-SERVICE
        predicates:
          - Path=/api/account/**
        filters:
          - StripPrefix=1
      - id: transection-service
        url: Ib://TRANSACTION-SERVICE
          - StripPrefix=1
          - name: CircuitBreaker
            args:
              name: transactionCB
      - id: auth-service
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/auth/**
            - Path=/oauth2/**
          filters:
            - StripPrefix=1
              fallbackUri: forward:/fallback
eureka:
  client:
    serviceUrl: http://localhost:8761/eureka
management:
  endpoints:
    web:
      exposure:
        include:
          - health
          - info
          - metrics
          - prometheus
